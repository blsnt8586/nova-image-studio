# Nova Image Studio 生产编排(仅 nova 本体)
# PostgreSQL / Redis / MinIO 由你服务器已有的服务提供,不在此文件内。
# 本机环境:依赖服务都在 docker 网络 `1panel-network` 里,nova 直接加入该网络,
# 用容器名(postgresql / redis / minio)+ 内部端口互连。
#
# 启动:  docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
# 日志:  docker compose -f docker-compose.prod.yml logs -f
# 停止:  docker compose -f docker-compose.prod.yml down

services:
  nova:
    build:
      context: .
      dockerfile: Dockerfile
    image: nova-image-studio:latest
    container_name: nova-image
    restart: unless-stopped
    # 端口映射:宿主机 NOVA_HOST_PORT -> 容器 3000。openresty 反代指向这个宿主端口。
    ports:
      - "${NOVA_HOST_PORT:-3000}:3000"
    env_file:
      - .env.production
    networks:
      - default
      - onepanel

networks:
  # nova compose 自己的默认网络
  default:
  # 复用宿主机上已存在的 1panel-network(PG/Redis/MinIO 都在里面)
  onepanel:
    external: true
    name: 1panel-network
